[preset.0]
name="Web"
platform="Web"
runnable=true
export_filter="all_resources"
# export_path="HTML5/index.html"
# --- 關鍵修改：路徑改為 docs ---
export_path="docs/index.html"

# [preset.0.options]
# 1. 禁用多執行緒（避開 SharedArrayBuffer 錯誤）
# variant/thread_support=false

# 2. 禁用 ASTC 壓縮（避開非 HTTPS 下的硬體限制）
# vram_texture_compression/import_etc2_astc=false



[preset.0.options]
# 關鍵：這裡一定要是 false！這樣就不會檢查「跨網域隔離」和「共用陣列緩衝區」
variant/thread_support=false

# 為了手機相容性，建議也把這個關掉
vram_texture_compression/import_etc2_astc=false
vram_texture_compression/import_pvrtc=false

html/canvas_resize_policy=2
html/focus_canvas_on_select=true
