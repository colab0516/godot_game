[preset.0]
name="iOS"
platform="iOS"
runnable=true
export_filter="all_resources"
include_filter=""
exclude_filter=""
export_path="ios_build/index.xcode_project"

[preset.0.options]
# 這裡最重要：填入你的 Apple 開發者 ID 格式
application/bundle_identifier="com.yourname.projectname"
application/signature=""
application/short_version="1.0"
application/version="1.0.0"
application/name_zh_TW=""
application/name_en=""

# 圖標與啟動畫面 (如果你有圖的話)
launcher_icons/iphone_120x120=""
launcher_icons/ipad_76x76=""

# 渲染設定：iOS 必須使用 gl_compatibility
renderer/rendering_method="gl_compatibility"

# 權限聲明 (如果有用到相機或麥克風才填，沒用到留空)
privacy/camera_usage_description=""
privacy/microphone_usage_description=""

# 編譯設定
architectures/arm64=true
    